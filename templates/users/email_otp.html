<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WriteSphere Verification</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #F7F9F9; color: #0F1419;">
    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #F7F9F9; padding: 40px 20px;">
        <tr>
            <td align="center">
                <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #FFFFFF; border-radius: 16px; border: 1px solid #EFF3F4; overflow: hidden; max-width: 500px; margin: 0 auto;">
                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding: 30px 20px 20px 20px; border-bottom: 1px solid #EFF3F4;">
                            <h1 style="margin: 0; font-size: 24px; font-weight: 800; color: #1D9BF0; letter-spacing: -0.5px;">WriteSphere</h1>
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td style="padding: 30px 30px 20px 30px;">
                            <p style="margin: 0 0 20px 0; font-size: 16px; line-height: 1.5; color: #0F1419;">
                                Hello,
                            </p>
                            <p style="margin: 0 0 24px 0; font-size: 16px; line-height: 1.5; color: #0F1419;">
                                Please use the following verification code to complete your registration process:
                            </p>
                            
                            <!-- OTP Box -->
                            <div style="background-color: #F7F9F9; border: 1px solid #EFF3F4; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 24px;">
                                <span style="font-size: 36px; font-weight: 800; letter-spacing: 6px; color: #0F1419; margin-left: 6px;">{{ otp_code }}</span>
                            </div>
                            
                            <p style="margin: 0 0 10px 0; font-size: 15px; line-height: 1.6; color: #536471;">
                                This code will expire in <strong>5 minutes</strong>.
                            </p>
                            <p style="margin: 0; font-size: 15px; line-height: 1.6; color: #536471;">
                                If you did not request this, please safely ignore this email.
                            </p>
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td align="center" style="padding: 24px; background-color: #F7F9F9; border-top: 1px solid #EFF3F4;">
                            <p style="margin: 0 0 8px 0; font-size: 13px; color: #536471; font-weight: 600;">
                                WriteSphere community
                            </p>
                            <p style="margin: 0; font-size: 12px; color: #8B98A5;">
                                &copy; {% now "Y" %} WriteSphere. All rights reserved.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
